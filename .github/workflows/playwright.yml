name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - uses: actions/setup-node@v5
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Start gRPC mock server
      run: |
        nohup npx ts-node util/gRPC/mock-server/mock-server.ts > mock-server.log 2>&1 &
        echo "Mock server iniciado en background (PID: $!)"
    - name: Wait for gRPC mock server to be ready
      run: |
          for i in {1..15}; do
            if nc -z localhost 50051; then
              echo "Mock server listo"
              exit 0
            fi
            echo "Esperando mock server... intento $i"
            sleep 1
          done
          echo "El mock server no levantó a tiempo"
          cat mock-server.log
          exit 1
    - name: Run Playwright tests
      run: npx playwright test
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30